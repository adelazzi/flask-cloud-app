<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Activity Log · School OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d0f14;
      --surface: #13161e;
      --card:    #1a1e28;
      --border:  #252936;
      --accent:  #4f8ef7;
      --success: #22c97a;
      --danger:  #f75b5b;
      --warn:    #f7a94f;
      --text:    #e8eaf2;
      --muted:   #5c6280;
      --radius:  12px;
      --mono:    'DM Mono', monospace;
      --sans:    'Syne', sans-serif;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 48px 48px;
      opacity: .35;
      pointer-events: none;
    }

    .shell { max-width: 1000px; margin: 0 auto; padding: 40px 24px 80px; position: relative; }

    header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; flex-wrap: wrap; gap: 16px; }

    .brand-tag { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: .12em; text-transform: uppercase; }

    h1 {
      font-size: clamp(28px, 5vw, 44px); font-weight: 800; letter-spacing: -.02em; line-height: 1;
      background: linear-gradient(135deg, var(--text) 40%, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }

    .nav-link {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 18px; border-radius: var(--radius); border: 1px solid var(--border);
      background: var(--card); color: var(--text); text-decoration: none;
      font-size: 13px; font-weight: 600; transition: opacity .15s;
    }
    .nav-link:hover { opacity: .8; }

    /* Stats */
    .stats { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 20px; flex: 1; min-width: 100px; }
    .stat-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
    .stat-value { font-size: 28px; font-weight: 800; letter-spacing: -.03em; line-height: 1.2; }
    .c-accent  { color: var(--accent); }
    .c-success { color: var(--success); }
    .c-danger  { color: var(--danger); }
    .c-warn    { color: var(--warn); }

    /* Toolbar */
    .toolbar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
    .filter-group { display: flex; gap: 6px; }

    .chip {
      padding: 7px 14px; border-radius: 99px; border: 1px solid var(--border);
      background: var(--card); color: var(--muted); font-family: var(--mono);
      font-size: 11px; cursor: pointer; transition: all .15s; text-transform: uppercase; letter-spacing: .08em;
    }
    .chip.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,.1); }
    .chip.created.active  { border-color: var(--success); color: var(--success); background: rgba(34,201,122,.1); }
    .chip.updated.active  { border-color: var(--warn);    color: var(--warn);    background: rgba(247,169,79,.1); }
    .chip.deleted.active  { border-color: var(--danger);  color: var(--danger);  background: rgba(247,91,91,.1); }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--card); color: var(--text); font-family: var(--sans); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    .btn:hover { opacity: .8; }

    /* Timeline */
    .timeline { position: relative; padding-left: 28px; }
    .timeline::before { content: ''; position: absolute; left: 7px; top: 0; bottom: 0; width: 2px; background: var(--border); border-radius: 99px; }

    .log-entry {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 10px;
      transition: border-color .15s;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    .log-entry:hover { border-color: var(--accent); }

    .log-dot {
      position: absolute;
      left: -25px; top: 18px;
      width: 12px; height: 12px;
      border-radius: 50%;
      border: 2px solid var(--bg);
    }

    .dot-created { background: var(--success); }
    .dot-updated { background: var(--warn); }
    .dot-deleted { background: var(--danger); }

    .log-header { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 8px; }

    .action-badge {
      padding: 2px 10px; border-radius: 99px;
      font-family: var(--mono); font-size: 11px; font-weight: 500; text-transform: uppercase; letter-spacing: .08em;
    }
    .badge-created { background: rgba(34,201,122,.12); color: var(--success); }
    .badge-updated { background: rgba(247,169,79,.12);  color: var(--warn); }
    .badge-deleted { background: rgba(247,91,91,.12);   color: var(--danger); }

    .log-name { font-weight: 700; font-size: 15px; }
    .log-time { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-left: auto; }

    .log-meta { display: flex; gap: 16px; flex-wrap: wrap; }
    .log-meta-item { font-family: var(--mono); font-size: 12px; color: var(--muted); }
    .log-meta-item span { color: var(--text); }

    .mark-inline { font-weight: 700; }
    .mk-high { color: var(--success); }
    .mk-mid  { color: var(--warn); }
    .mk-low  { color: var(--danger); }

    .empty { text-align: center; padding: 64px 24px; color: var(--muted); font-size: 14px; }

    .mongo-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(34,201,122,.08); border: 1px solid rgba(34,201,122,.2);
      border-radius: 99px; padding: 4px 12px;
      font-family: var(--mono); font-size: 11px; color: var(--success);
    }
    .mongo-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--success); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div>
      <div class="brand-tag">School OS · MongoDB Audit Trail</div>
      <h1>Activity Log</h1>
    </div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <span class="mongo-badge"><span class="mongo-dot"></span>MongoDB</span>
      <a href="/students" class="nav-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
        Students
      </a>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="stat-label">Total Events</div><div class="stat-value c-accent" id="s-total">—</div></div>
    <div class="stat"><div class="stat-label">Created</div><div class="stat-value c-success" id="s-created">—</div></div>
    <div class="stat"><div class="stat-label">Updated</div><div class="stat-value c-warn" id="s-updated">—</div></div>
    <div class="stat"><div class="stat-label">Deleted</div><div class="stat-value c-danger" id="s-deleted">—</div></div>
  </div>

  <div class="toolbar">
    <div class="filter-group">
      <button class="chip active" data-filter="all" onclick="setFilter('all',this)">All</button>
      <button class="chip created" data-filter="created" onclick="setFilter('created',this)">Created</button>
      <button class="chip updated" data-filter="updated" onclick="setFilter('updated',this)">Updated</button>
      <button class="chip deleted" data-filter="deleted" onclick="setFilter('deleted',this)">Deleted</button>
    </div>
    <button class="btn" style="margin-left:auto" onclick="loadLogs()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>
      Refresh
    </button>
  </div>

  <div class="timeline" id="timeline">
    <div class="empty">Loading…</div>
  </div>

</div>

<script>
let allLogs  = [];
let activeFilter = 'all';

async function loadLogs() {
  try {
    const res  = await fetch('/api/logs');
    allLogs    = await res.json();
    updateStats();
    render();
  } catch(e) {
    document.getElementById('timeline').innerHTML =
      '<div class="empty">Could not load logs — MongoDB may be unavailable.</div>';
  }
}

function updateStats() {
  document.getElementById('s-total').textContent   = allLogs.length;
  document.getElementById('s-created').textContent = allLogs.filter(l=>l.action==='created').length;
  document.getElementById('s-updated').textContent = allLogs.filter(l=>l.action==='updated').length;
  document.getElementById('s-deleted').textContent = allLogs.filter(l=>l.action==='deleted').length;
}

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const list = activeFilter === 'all' ? allLogs : allLogs.filter(l => l.action === activeFilter);
  const tl   = document.getElementById('timeline');

  if (!list.length) {
    tl.innerHTML = '<div class="empty">No events found.</div>';
    return;
  }

  tl.innerHTML = list.map(log => {
    const mark    = log.mark ?? null;
    const mkClass = mark === null ? '' : mark >= 14 ? 'mk-high' : mark >= 10 ? 'mk-mid' : 'mk-low';
    const markStr = mark !== null ? `<span class="mark-inline ${mkClass}">${Number(mark).toFixed(2)}/20</span>` : '—';
    const ts      = log.timestamp ? new Date(log.timestamp).toLocaleString() : '—';

    return `
    <div class="log-entry">
      <div class="log-dot dot-${log.action}"></div>
      <div class="log-header">
        <span class="action-badge badge-${log.action}">${log.action}</span>
        <span class="log-name">${esc(log.student_name || '—')}</span>
        <span class="log-time">${ts}</span>
      </div>
      <div class="log-meta">
        <div class="log-meta-item">ID <span>#${log.student_id ?? '—'}</span></div>
        <div class="log-meta-item">Matricule <span>${esc(log.matricule || '—')}</span></div>
        <div class="log-meta-item">Mark ${markStr}</div>
        <div class="log-meta-item">Status <span>${log.status || '—'}</span></div>
      </div>
    </div>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

loadLogs();
</script>
</body>
</html>
